# Configuración de la aplicación
spring.application.name=parque
# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/amusement_park?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Contraseña123
# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
# Mostrar las consultas SQL en la consola
spring.jpa.show-sql=true
# Configura el dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Incluye detalles de error
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always